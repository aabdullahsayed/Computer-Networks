<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850" style="background-color: #FAFAFA; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-2%" y="-5%" width="104%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,2 L8,5 L0,8 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,2 L8,5 L0,8 z" fill="#EF4444"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,2 L8,5 L0,8 z" fill="#10B981"/>
    </marker>
  </defs>

  <text x="500" y="50" font-size="26" font-weight="800" fill="#1E293B" text-anchor="middle" letter-spacing="0.5">THE 4 CHARACTERISTICS OF DATA COMMUNICATION</text>
  <text x="500" y="75" font-size="15" fill="#64748B" text-anchor="middle">Visualizing Delivery, Accuracy, Timeliness, and Jitter</text>

  <rect x="50" y="110" width="900" height="150" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  
  <rect x="50" y="110" width="140" height="150" fill="#F8FAFC" stroke="none" clip-path="inset(0 0 0 0 round 12px 0 0 12px)"/>
  <line x1="190" y1="110" x2="190" y2="260" stroke="#E2E8F0" stroke-width="2"/>
  <text x="120" y="180" font-size="18" font-weight="bold" fill="#0F172A" text-anchor="middle">1. Delivery</text>
  <text x="120" y="200" font-size="12" fill="#64748B" text-anchor="middle">Must reach the</text>
  <text x="120" y="215" font-size="12" fill="#64748B" text-anchor="middle">correct destination.</text>

  <text x="380" y="140" font-size="14" font-weight="bold" fill="#10B981" text-anchor="middle">Successful Delivery</text>
  <rect x="230" y="160" width="60" height="40" rx="4" fill="#F1F5F9" stroke="#64748B" stroke-width="2"/>
  <text x="260" y="185" font-size="12" fill="#334155" text-anchor="middle">Sender</text>
  <rect x="470" y="160" width="60" height="40" rx="4" fill="#F1F5F9" stroke="#64748B" stroke-width="2"/>
  <text x="500" y="185" font-size="12" fill="#334155" text-anchor="middle">Receiver</text>
  <line x1="290" y1="180" x2="470" y2="180" stroke="#64748B" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <rect x="360" y="170" width="40" height="20" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="380" y="184" font-size="10" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Data</text>

  <line x1="570" y1="130" x2="570" y2="240" stroke="#E2E8F0" stroke-width="2"/>

  <text x="750" y="140" font-size="14" font-weight="bold" fill="#EF4444" text-anchor="middle">Failed Delivery (Dropped)</text>
  <rect x="610" y="160" width="60" height="40" rx="4" fill="#F1F5F9" stroke="#64748B" stroke-width="2"/>
  <text x="640" y="185" font-size="12" fill="#334155" text-anchor="middle">Sender</text>
  <rect x="850" y="160" width="60" height="40" rx="4" fill="#F1F5F9" stroke="#64748B" stroke-width="2"/>
  <text x="880" y="185" font-size="12" fill="#334155" text-anchor="middle">Receiver</text>
  <line x1="670" y1="180" x2="850" y2="180" stroke="#64748B" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <line x1="740" y1="170" x2="760" y2="190" stroke="#EF4444" stroke-width="4"/>
  <line x1="760" y1="170" x2="740" y2="190" stroke="#EF4444" stroke-width="4"/>
  <rect x="740" y="210" width="40" height="20" rx="2" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
  <text x="760" y="224" font-size="10" font-weight="bold" fill="#DC2626" text-anchor="middle" opacity="0.5">Lost</text>


  <rect x="50" y="280" width="900" height="150" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  
  <rect x="50" y="280" width="140" height="150" fill="#F8FAFC" stroke="none" clip-path="inset(0 0 0 0 round 12px 0 0 12px)"/>
  <line x1="190" y1="280" x2="190" y2="430" stroke="#E2E8F0" stroke-width="2"/>
  <text x="120" y="350" font-size="18" font-weight="bold" fill="#0F172A" text-anchor="middle">2. Accuracy</text>
  <text x="120" y="370" font-size="12" fill="#64748B" text-anchor="middle">Data must not be</text>
  <text x="120" y="385" font-size="12" fill="#64748B" text-anchor="middle">altered in transit.</text>

  <text x="380" y="310" font-size="14" font-weight="bold" fill="#10B981" text-anchor="middle">Accurate Transmission</text>
  <rect x="230" y="330" width="60" height="40" rx="4" fill="#F1F5F9" stroke="#64748B" stroke-width="2"/>
  <text x="260" y="355" font-size="12" fill="#334155" text-anchor="middle">1011</text>
  <rect x="470" y="330" width="60" height="40" rx="4" fill="#DCFCE7" stroke="#10B981" stroke-width="2"/>
  <text x="500" y="355" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">1011</text>
  <line x1="290" y1="350" x2="470" y2="350" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="360" y="340" width="40" height="20" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="380" y="354" font-size="10" font-weight="bold" fill="#1D4ED8" text-anchor="middle">1011</text>

  <line x1="570" y1="300" x2="570" y2="410" stroke="#E2E8F0" stroke-width="2"/>

  <text x="750" y="310" font-size="14" font-weight="bold" fill="#EF4444" text-anchor="middle">Corrupted Transmission</text>
  <rect x="610" y="330" width="60" height="40" rx="4" fill="#F1F5F9" stroke="#64748B" stroke-width="2"/>
  <text x="640" y="355" font-size="12" fill="#334155" text-anchor="middle">1011</text>
  <rect x="850" y="330" width="60" height="40" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="880" y="355" font-size="12" font-weight="bold" fill="#DC2626" text-anchor="middle">1000</text>
  <line x1="670" y1="350" x2="850" y2="350" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="730" y="340" width="40" height="20" rx="2" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="750" y="354" font-size="10" font-weight="bold" fill="#DC2626" text-anchor="middle">1000</text>
  <text x="750" y="380" font-size="12" font-weight="bold" fill="#DC2626" text-anchor="middle">(Bit Flipped)</text>


  <rect x="50" y="450" width="900" height="170" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  
  <rect x="50" y="450" width="140" height="170" fill="#F8FAFC" stroke="none" clip-path="inset(0 0 0 0 round 12px 0 0 12px)"/>
  <line x1="190" y1="450" x2="190" y2="620" stroke="#E2E8F0" stroke-width="2"/>
  <text x="120" y="525" font-size="18" font-weight="bold" fill="#0F172A" text-anchor="middle">3. Timeliness</text>
  <text x="120" y="545" font-size="12" fill="#64748B" text-anchor="middle">Must arrive before</text>
  <text x="120" y="560" font-size="12" fill="#64748B" text-anchor="middle">it becomes useless.</text>

  <line x1="230" y1="560" x2="900" y2="560" stroke="#CBD5E1" stroke-width="4"/>
  <line x1="250" y1="550" x2="250" y2="570" stroke="#475569" stroke-width="2"/>
  <text x="250" y="590" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">Sent (0ms)</text>
  
  <line x1="600" y1="470" x2="600" y2="570" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="600" y="590" font-size="12" font-weight="bold" fill="#DC2626" text-anchor="middle">Deadline (e.g., Live Video)</text>
  
  <rect x="250" y="556" width="350" height="8" fill="#10B981" opacity="0.3"/> <rect x="600" y="556" width="300" height="8" fill="#EF4444" opacity="0.3"/> <rect x="450" y="480" width="40" height="30" rx="4" fill="#DCFCE7" stroke="#10B981" stroke-width="2"/>
  <line x1="470" y1="510" x2="470" y2="560" stroke="#10B981" stroke-width="2"/>
  <text x="470" y="470" font-size="12" font-weight="bold" fill="#059669" text-anchor="middle">Arrives On-Time</text>

  <rect x="800" y="480" width="40" height="30" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <line x1="820" y1="510" x2="820" y2="560" stroke="#EF4444" stroke-width="2"/>
  <text x="820" y="470" font-size="12" font-weight="bold" fill="#DC2626" text-anchor="middle">Arrives Too Late (Discarded)</text>


  <rect x="50" y="640" width="900" height="170" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  
  <rect x="50" y="640" width="140" height="170" fill="#F8FAFC" stroke="none" clip-path="inset(0 0 0 0 round 12px 0 0 12px)"/>
  <line x1="190" y1="640" x2="190" y2="810" stroke="#E2E8F0" stroke-width="2"/>
  <text x="120" y="715" font-size="18" font-weight="bold" fill="#0F172A" text-anchor="middle">4. Jitter</text>
  <text x="120" y="735" font-size="12" fill="#64748B" text-anchor="middle">Variation in arrival</text>
  <text x="120" y="750" font-size="12" fill="#64748B" text-anchor="middle">delay (spacing).</text>

  <text x="220" y="680" font-size="14" font-weight="bold" fill="#10B981">Low Jitter (Good Audio/Video)</text>
  <line x1="220" y1="710" x2="900" y2="710" stroke="#CBD5E1" stroke-width="2"/>
  
  <rect x="300" y="695" width="20" height="30" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <rect x="450" y="695" width="20" height="30" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <rect x="600" y="695" width="20" height="30" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <rect x="750" y="695" width="20" height="30" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  
  <path d="M 325 710 Q 385 690 445 710" fill="none" stroke="#64748B" stroke-width="1"/>
  <text x="385" y="695" font-size="10" fill="#64748B" text-anchor="middle">20ms gap</text>
  <path d="M 475 710 Q 535 690 595 710" fill="none" stroke="#64748B" stroke-width="1"/>
  <text x="535" y="695" font-size="10" fill="#64748B" text-anchor="middle">20ms gap</text>
  <path d="M 625 710 Q 685 690 745 710" fill="none" stroke="#64748B" stroke-width="1"/>
  <text x="685" y="695" font-size="10" fill="#64748B" text-anchor="middle">20ms gap</text>


  <text x="220" y="760" font-size="14" font-weight="bold" fill="#EF4444">High Jitter (Choppy Audio/Video)</text>
  <line x1="220" y1="790" x2="900" y2="790" stroke="#CBD5E1" stroke-width="2"/>
  
  <rect x="300" y="775" width="20" height="30" rx="2" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <rect x="400" y="775" width="20" height="30" rx="2" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <rect x="680" y="775" width="20" height="30" rx="2" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <rect x="720" y="775" width="20" height="30" rx="2" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  
  <path d="M 325 790 Q 362 770 395 790" fill="none" stroke="#64748B" stroke-width="1"/>
  <text x="360" y="775" font-size="10" fill="#64748B" text-anchor="middle">10ms</text>
  <path d="M 425 790 Q 550 750 675 790" fill="none" stroke="#64748B" stroke-width="1"/>
  <text x="550" y="765" font-size="10" fill="#EF4444" font-weight="bold" text-anchor="middle">Long 50ms gap!</text>
  <path d="M 705 790 Q 712 770 715 790" fill="none" stroke="#64748B" stroke-width="1"/>
  <text x="710" y="765" font-size="10" fill="#64748B" text-anchor="middle">5ms</text>

</svg>
