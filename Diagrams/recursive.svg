<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" style="background-color: #FFFFFF; font-family: 'Times New Roman', Times, serif;">
  <defs>
    <g id="pc">
      <rect x="-24" y="-20" width="48" height="36" rx="3" fill="#F8FAFC" stroke="#334155" stroke-width="2"/>
      <rect x="-18" y="-14" width="36" height="24" rx="1" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
      <rect x="-6" y="16" width="12" height="8" fill="#64748B" stroke="#334155" stroke-width="1"/>
      <rect x="-30" y="24" width="60" height="10" rx="2" fill="#F1F5F9" stroke="#334155" stroke-width="2"/>
      <path d="M 35 29 C 35 26, 43 26, 43 29 C 43 32, 35 32, 35 29 Z" fill="#F1F5F9" stroke="#334155" stroke-width="1.5"/>
    </g>
    <marker id="arrow-req" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9 z" fill="#1E293B"/>
    </marker>
    <marker id="arrow-res" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9 z" fill="#1E293B"/>
    </marker>
  </defs>

  <text x="500" y="50" font-size="32" fill="#000000" text-anchor="middle">Recursive DNS Resolution</text>

  <text x="500" y="125" font-size="18" fill="#000000" text-anchor="middle">Root server</text>
  <use href="#pc" x="500" y="150"/>

  <text x="350" y="325" font-size="18" fill="#000000" text-anchor="end">edu</text>
  <use href="#pc" x="380" y="350"/>

  <text x="650" y="325" font-size="18" fill="#000000" text-anchor="start">com</text>
  <use href="#pc" x="620" y="350"/>

  <use href="#pc" x="300" y="550"/>
  <text x="300" y="605" font-size="18" fill="#000000" text-anchor="middle">fhda.edu</text>

  <use href="#pc" x="700" y="550"/>
  <text x="700" y="605" font-size="18" fill="#000000" text-anchor="middle">mcgraw.com</text>
  <text x="800" y="565" font-size="28" font-weight="bold" letter-spacing="2" fill="#000000">...</text>

  <use href="#pc" x="120" y="550"/>
  <text x="120" y="605" font-size="18" fill="#000000" text-anchor="middle">Client</text>


  <line x1="170" y1="535" x2="250" y2="535" stroke="#1E293B" stroke-width="4" marker-end="url(#arrow-req)"/>
  <text x="210" y="525" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">1</text>

  <line x1="250" y1="565" x2="170" y2="565" stroke="#1E293B" stroke-width="4" marker-end="url(#arrow-res)"/>
  <text x="210" y="590" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">10</text>


  <line x1="320" y1="510" x2="360" y2="400" stroke="#1E293B" stroke-width="4" marker-end="url(#arrow-req)"/>
  <text x="325" y="450" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">2</text>

  <line x1="380" y1="400" x2="340" y2="510" stroke="#1E293B" stroke-width="4" marker-end="url(#arrow-res)"/>
  <text x="375" y="480" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">9</text>


  <line x1="400" y1="310" x2="470" y2="200" stroke="#1E293B" stroke-width="4" marker-end="url(#arrow-req)"/>
  <text x="420" y="250" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">3</text>

  <line x1="490" y1="200" x2="420" y2="310" stroke="#1E293B" stroke-width="4" marker-end="url(#arrow-res)"/>
  <text x="470" y="280" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">8</text>


  <line x1="530" y1="200" x2="600" y2="310" stroke="#1E293B" stroke-width="4" marker-end="url(#arrow-req)"/>
  <text x="580" y="250" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">4</text>

  <line x1="580" y1="310" x2="510" y2="200" stroke="#1E293B" stroke-width="4" marker-end="url(#arrow-res)"/>
  <text x="530" y="280" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">7</text>


  <line x1="640" y1="400" x2="680" y2="510" stroke="#1E293B" stroke-width="4" marker-end="url(#arrow-req)"/>
  <text x="675" y="450" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">5</text>

  <line x1="700" y1="510" x2="660" y2="400" stroke="#1E293B" stroke-width="4" marker-end="url(#arrow-res)"/>
  <text x="665" y="480" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">6</text>

</svg>
