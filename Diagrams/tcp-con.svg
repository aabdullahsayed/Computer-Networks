<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1050" style="background-color: #FAFAFA; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Caveat', 'Kalam', cursive, sans-serif;">
  <defs>
    <!-- Sketchy Wobble Filter -->
    <filter id="wobble" filterUnits="userSpaceOnUse" x="-100" y="-100" width="1600" height="1500" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <!-- Arrowhead Markers -->
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <!-- Sketchy Client PC Icon -->
    <g id="client-pc">
      <rect x="-35" y="-25" width="70" height="45" rx="4" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
      <line x1="-35" y1="10" x2="35" y2="10" stroke="#334155" stroke-width="2"/>
      <rect x="-10" y="20" width="20" height="15" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
      <rect x="-25" y="35" width="50" height="8" rx="3" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
    </g>

    <!-- Sketchy Server Icon -->
    <g id="server">
      <rect x="-30" y="-35" width="60" height="80" rx="4" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
      <line x1="-30" y1="-10" x2="30" y2="-10" stroke="#334155" stroke-width="2"/>
      <line x1="-30" y1="15" x2="30" y2="15" stroke="#334155" stroke-width="2"/>
      <circle cx="-15" cy="-22" r="3" fill="#334155"/>
      <circle cx="-15" cy="3" r="3" fill="#334155"/>
      <circle cx="-15" cy="28" r="3" fill="#334155"/>
    </g>
  </defs>

  <!-- Main Title -->
  <text x="550" y="50" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle" letter-spacing="1">TCP Full Communication Lifecycle</text>
  <text x="550" y="80" font-size="16" fill="#64748b" text-anchor="middle">From the 3-way handshake, through data transfer, to the 4-way teardown.</text>

  <!-- Headers -->
  <text x="250" y="130" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">Client (Sender)</text>
  <text x="850" y="130" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">Server (Receiver)</text>

  <g filter="url(#wobble)">
    <!-- Devices -->
    <use href="#client-pc" x="250" y="180"/>
    <use href="#server" x="850" y="180"/>

    <!-- Vertical Lifelines (Time flowing down) -->
    <line x1="250" y1="230" x2="250" y2="980" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="10 8"/>
    <line x1="850" y1="230" x2="850" y2="980" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="10 8"/>
  </g>

  <!-- ====================================================================== -->
  <!-- PHASE 1: CONNECTION ESTABLISHMENT (3-Way Handshake) -->
  <!-- ====================================================================== -->
  <g filter="url(#wobble)">
    <!-- Phase Background Box -->
    <rect x="70" y="240" width="960" height="180" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <rect x="73" y="243" width="954" height="174" rx="12" fill="none" stroke="#34d399" stroke-width="1.5"/>

    <!-- Arrows -->
    <!-- SYN -->
    <line x1="250" y1="280" x2="835" y2="310" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>
    <!-- SYN-ACK -->
    <line x1="850" y1="330" x2="265" y2="360" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>
    <!-- ACK -->
    <line x1="250" y1="380" x2="835" y2="410" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>
  </g>

  <text x="90" y="270" font-size="18" font-weight="bold" fill="#047857">1. Setup</text>
  <text x="90" y="290" font-size="14" fill="#065f46">3-Way Handshake</text>

  <text x="550" y="285" font-size="15" font-weight="bold" fill="#047857" text-anchor="middle">SYN (Seq = x)</text>
  <text x="550" y="305" font-size="13" fill="#065f46" text-anchor="middle">"I'd like to connect. My starting number is x."</text>

  <text x="550" y="340" font-size="15" font-weight="bold" fill="#047857" text-anchor="middle">SYN + ACK (Seq = y, Ack = x+1)</text>
  <text x="550" y="360" font-size="13" fill="#065f46" text-anchor="middle">"I acknowledge x, let's connect. My number is y."</text>

  <text x="550" y="390" font-size="15" font-weight="bold" fill="#047857" text-anchor="middle">ACK (Ack = y+1)</text>
  <text x="550" y="410" font-size="13" fill="#065f46" text-anchor="middle">"I acknowledge y. Connection Established!"</text>


  <!-- ====================================================================== -->
  <!-- PHASE 2: DATA TRANSFER -->
  <!-- ====================================================================== -->
  <g filter="url(#wobble)">
    <!-- Phase Background Box -->
    <rect x="70" y="440" width="960" height="230" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="73" y="443" width="954" height="224" rx="12" fill="none" stroke="#60a5fa" stroke-width="1.5"/>

    <!-- Arrows -->
    <!-- Client sends Data -->
    <line x1="250" y1="480" x2="835" y2="510" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <!-- Server ACKs Data -->
    <line x1="850" y1="530" x2="265" y2="560" stroke="#3b82f6" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow-blue)"/>
    <!-- Server sends Data -->
    <line x1="850" y1="580" x2="265" y2="610" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <!-- Client ACKs Data -->
    <line x1="250" y1="630" x2="835" y2="660" stroke="#3b82f6" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow-blue)"/>
  </g>

  <text x="90" y="470" font-size="18" font-weight="bold" fill="#1d4ed8">2. Transfer</text>
  <text x="90" y="490" font-size="14" fill="#1e3a8a">Guaranteed Delivery</text>

  <text x="550" y="485" font-size="15" font-weight="bold" fill="#1d4ed8" text-anchor="middle">PSH, ACK (Client Data Segment)</text>
  <text x="550" y="505" font-size="13" fill="#1e3a8a" text-anchor="middle">"Here is the HTTP GET request."</text>

  <text x="550" y="540" font-size="15" font-style="italic" fill="#1d4ed8" text-anchor="middle">ACK</text>
  <text x="550" y="560" font-size="13" fill="#1e3a8a" text-anchor="middle">"Received the client data."</text>

  <text x="550" y="585" font-size="15" font-weight="bold" fill="#1d4ed8" text-anchor="middle">PSH, ACK (Server Data Segment)</text>
  <text x="550" y="605" font-size="13" fill="#1e3a8a" text-anchor="middle">"Here is the HTTP 200 OK Response (Webpage Data)."</text>

  <text x="550" y="640" font-size="15" font-style="italic" fill="#1d4ed8" text-anchor="middle">ACK</text>
  <text x="550" y="660" font-size="13" fill="#1e3a8a" text-anchor="middle">"Received the server data."</text>


  <!-- ====================================================================== -->
  <!-- PHASE 3: CONNECTION TERMINATION (4-Way Handshake) -->
  <!-- ====================================================================== -->
  <g filter="url(#wobble)">
    <!-- Phase Background Box -->
    <rect x="70" y="690" width="960" height="250" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <rect x="73" y="693" width="954" height="244" rx="12" fill="none" stroke="#f87171" stroke-width="1.5"/>

    <!-- Arrows -->
    <!-- Client FIN -->
    <line x1="250" y1="730" x2="835" y2="760" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
    <!-- Server ACK -->
    <line x1="850" y1="780" x2="265" y2="810" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
    
    <!-- (Server finishes up its background tasks here) -->
    
    <!-- Server FIN -->
    <line x1="850" y1="850" x2="265" y2="880" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
    <!-- Client ACK -->
    <line x1="250" y1="900" x2="835" y2="930" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
  </g>

  <text x="90" y="720" font-size="18" font-weight="bold" fill="#b91c1c">3. Teardown</text>
  <text x="90" y="740" font-size="14" fill="#7f1d1d">4-Way Handshake</text>

  <text x="550" y="735" font-size="15" font-weight="bold" fill="#b91c1c" text-anchor="middle">FIN (Active Close)</text>
  <text x="550" y="755" font-size="13" fill="#7f1d1d" text-anchor="middle">"I am done sending data."</text>

  <text x="550" y="790" font-size="15" font-weight="bold" fill="#b91c1c" text-anchor="middle">ACK (Passive Close)</text>
  <text x="550" y="810" font-size="13" fill="#7f1d1d" text-anchor="middle">"Understood, you are done. Let me finish my current tasks."</text>
  
  <text x="830" y="835" font-size="12" fill="#64748b" text-anchor="end">(Server waits for app to close)</text>

  <text x="550" y="855" font-size="15" font-weight="bold" fill="#b91c1c" text-anchor="middle">FIN</text>
  <text x="550" y="875" font-size="13" fill="#7f1d1d" text-anchor="middle">"Okay, I am also done sending data now."</text>

  <text x="550" y="905" font-size="15" font-weight="bold" fill="#b91c1c" text-anchor="middle">ACK</text>
  <text x="550" y="925" font-size="13" fill="#7f1d1d" text-anchor="middle">"Understood. Connection Closed."</text>
  
  <!-- Final states -->
  <text x="250" y="995" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">CLOSED</text>
  <text x="850" y="995" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">CLOSED</text>

</svg>
