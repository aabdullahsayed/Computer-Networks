<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" style="background-color: #FAFAFA; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Caveat', 'Kalam', cursive, sans-serif;">
  <defs>
    <filter id="wobble" filterUnits="userSpaceOnUse" x="-100" y="-100" width="1200" height="800" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <marker id="arrow-down" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="500" y="80" font-size="36" font-weight="bold" fill="#0f172a" text-anchor="middle">Encapsulation and Decapsulation</text>
  
  <text x="500" y="140" font-size="16" fill="#1e293b" text-anchor="middle">• The packets at the transport layer are called <tspan font-style="italic" font-weight="bold">user datagram, segments, or packets</tspan></text>

  <text x="250" y="210" font-size="18" fill="#334155" text-anchor="middle">Client</text>

  <text x="140" y="260" font-size="16" fill="#334155" text-anchor="end">Application</text>
  <text x="140" y="280" font-size="16" fill="#334155" text-anchor="end">layer</text>
  
  <text x="140" y="360" font-size="16" fill="#334155" text-anchor="end">Transport</text>
  <text x="140" y="380" font-size="16" fill="#334155" text-anchor="end">layer</text>

  <g filter="url(#wobble)">
    <rect x="160" y="225" width="180" height="85" fill="#ffffff" stroke="#334155" stroke-width="2.5"/>
    
    <rect x="160" y="320" width="180" height="85" fill="#e2e8f0" stroke="#334155" stroke-width="2.5"/>
  </g>

  <text x="175" y="260" font-size="16" fill="#334155">Process</text>
  <g filter="url(#wobble)">
    <rect x="250" y="235" width="25" height="30" fill="#94a3b8" stroke="#334155" stroke-width="1.5"/>
    <rect x="253" y="238" width="25" height="30" fill="none" stroke="#64748b" stroke-width="1"/> <rect x="210" y="270" width="105" height="25" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  </g>
  <text x="262" y="288" font-size="15" fill="#334155" text-anchor="middle">Message</text>

  <g filter="url(#wobble)">
    <rect x="180" y="345" width="30" height="25" fill="#94a3b8" stroke="#334155" stroke-width="1.5"/>
    <line x1="195" y1="350" x2="195" y2="365" stroke="#334155" stroke-width="1.5"/> <rect x="210" y="345" width="105" height="25" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  </g>
  <text x="262" y="363" font-size="15" fill="#334155" text-anchor="middle">Payload</text>
  
  <text x="195" y="390" font-size="15" fill="#334155" text-anchor="middle">Header</text>
  <text x="262" y="390" font-size="15" fill="#334155" text-anchor="middle">Packet</text>

  <g filter="url(#wobble)">
    <line x1="210" y1="295" x2="210" y2="345" stroke="#334155" stroke-width="1.5"/>
    <line x1="315" y1="295" x2="315" y2="345" stroke="#334155" stroke-width="1.5"/>
    <line x1="262" y1="295" x2="262" y2="335" stroke="#334155" stroke-width="3" marker-end="url(#arrow-down)"/>
  </g>
  
  <text x="250" y="440" font-size="16" fill="#334155" text-anchor="middle">a. Encapsulation</text>


  <g filter="url(#wobble)">
    <line x1="355" y1="360" x2="590" y2="360" stroke="#cbd5e1" stroke-width="12"/>
    <polygon points="590,348 620,360 590,372" fill="#cbd5e1"/>
    
    <line x1="400" y1="360" x2="600" y2="360" stroke="#334155" stroke-width="2" marker-end="url(#arrow-down)"/> </g>
  <text x="500" y="390" font-size="16" fill="#334155" text-anchor="middle">Logical channel</text>


  <text x="750" y="210" font-size="18" fill="#334155" text-anchor="middle">Server</text>

  <text x="860" y="260" font-size="16" fill="#334155" text-anchor="start">Application</text>
  <text x="860" y="280" font-size="16" fill="#334155" text-anchor="start">layer</text>
  
  <text x="860" y="360" font-size="16" fill="#334155" text-anchor="start">Transport</text>
  <text x="860" y="380" font-size="16" fill="#334155" text-anchor="start">layer</text>

  <g filter="url(#wobble)">
    <rect x="660" y="225" width="180" height="85" fill="#ffffff" stroke="#334155" stroke-width="2.5"/>
    
    <rect x="660" y="320" width="180" height="85" fill="#e2e8f0" stroke="#334155" stroke-width="2.5"/>
  </g>

  <text x="675" y="260" font-size="16" fill="#334155">Process</text>
  <g filter="url(#wobble)">
    <rect x="750" y="235" width="25" height="30" fill="#94a3b8" stroke="#334155" stroke-width="1.5"/>
    <rect x="753" y="238" width="25" height="30" fill="none" stroke="#64748b" stroke-width="1"/>
    
    <rect x="710" y="270" width="105" height="25" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  </g>
  <text x="762" y="288" font-size="15" fill="#334155" text-anchor="middle">Message</text>

  <g filter="url(#wobble)">
    <rect x="680" y="345" width="30" height="25" fill="#94a3b8" stroke="#334155" stroke-width="1.5"/>
    
    <rect x="710" y="345" width="105" height="25" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  </g>
  <text x="762" y="363" font-size="15" fill="#334155" text-anchor="middle">Payload</text>
  
  <text x="695" y="390" font-size="15" fill="#334155" text-anchor="middle">Header</text>
  <text x="762" y="390" font-size="15" fill="#334155" text-anchor="middle">Packet</text>

  <g filter="url(#wobble)">
    <line x1="710" y1="345" x2="710" y2="295" stroke="#334155" stroke-width="1.5"/>
    <line x1="815" y1="345" x2="815" y2="295" stroke="#334155" stroke-width="1.5"/>
    <line x1="762" y1="345" x2="762" y2="305" stroke="#334155" stroke-width="3" marker-end="url(#arrow-up)"/>
  </g>

  <text x="750" y="440" font-size="16" fill="#334155" text-anchor="middle">b. Decapsulation</text>

</svg>
