<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="520" fill="#ffffff"/>
  
  <text x="500" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000000">Internet Addressing Hierarchy</text>

  <g transform="translate(100, 80)">
    <rect width="800" height="60" fill="none" stroke="#333333" stroke-width="1.5"/>
    <text x="20" y="36" font-family="sans-serif" font-size="15" font-weight="bold" fill="#000000">L4: Port Number</text>
    <text x="160" y="36" font-family="sans-serif" font-size="13" fill="#666666">(App-to-App) e.g., 443, 80, 22</text>
    <text x="780" y="36" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="bold" fill="#000000">UNCHANGED</text>
  </g>

  <g transform="translate(100, 160)">
    <rect width="800" height="60" fill="none" stroke="#333333" stroke-width="1.5"/>
    <text x="20" y="36" font-family="sans-serif" font-size="15" font-weight="bold" fill="#000000">L3: IP Address</text>
    <text x="160" y="36" font-family="sans-serif" font-size="13" fill="#666666">(Host-to-Host) e.g., 192.168.1.1</text>
    <text x="780" y="36" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="bold" fill="#000000">UNCHANGED</text>
  </g>

  <g transform="translate(100, 240)">
    <rect width="800" height="60" fill="none" stroke="#333333" stroke-width="1.5"/>
    <text x="20" y="36" font-family="sans-serif" font-size="15" font-weight="bold" fill="#000000">L2: MAC Address</text>
    <text x="160" y="36" font-family="sans-serif" font-size="13" fill="#666666">(Hop-to-Hop) e.g., 00:1A:2B:3C...</text>
    <text x="780" y="36" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="bold" fill="#000000">CHANGES EVERY HOP</text>
  </g>

  <g transform="translate(0, 40)">
    <line x1="200" y1="320" x2="800" y2="320" stroke="#000000" stroke-width="1.5" stroke-dasharray="8 4"/>
    
    <circle cx="200" cy="320" r="5" fill="#000000"/>
    <circle cx="500" cy="320" r="5" fill="#000000"/>
    <circle cx="800" cy="320" r="5" fill="#000000"/>
    
    <text x="200" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold">Sender</text>
    <text x="500" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold">Router</text>
    <text x="800" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold">Receiver</text>

    <path d="M210 370 H490" stroke="#000000" stroke-width="1" fill="none"/>
    <text x="350" y="385" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic">MAC #1</text>
    
    <path d="M510 370 H790" stroke="#000000" stroke-width="1" fill="none"/>
    <text x="650" y="385" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic">MAC #2</text>

    <path d="M200 420 H800" stroke="#000000" stroke-width="2" fill="none"/>
    <text x="500" y="440" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold">IP and Port: Single Path (Static)</text>
  </g>
</svg>
