<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9 z" fill="#64748B"/>
    </marker>
  </defs>

  <text x="600" y="50" font-size="28" font-weight="bold" fill="#0F172A" text-anchor="middle">How DNS Resolution Works</text>

  <path d="M 210 320 L 406 320" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  
  <path d="M 420 380 L 224 380" fill="none" stroke="#64748B" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>

  <path d="M 600 260 L 890 260 L 890 100 L 936 100" fill="none" stroke="#64748B" stroke-width="2" stroke-linejoin="round" marker-end="url(#arrow)"/>
  
  <path d="M 950 140 L 850 140 L 850 280 L 614 280" fill="none" stroke="#64748B" stroke-width="2" stroke-dasharray="6,4" stroke-linejoin="round" marker-end="url(#arrow)"/>

  <path d="M 600 330 L 936 330" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  
  <path d="M 950 370 L 614 370" fill="none" stroke="#64748B" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>

  <path d="M 600 420 L 810 420 L 810 560 L 936 560" fill="none" stroke="#64748B" stroke-width="2" stroke-linejoin="round" marker-end="url(#arrow)"/>
  
  <path d="M 950 600 L 770 600 L 770 440 L 614 440" fill="none" stroke="#64748B" stroke-width="2" stroke-dasharray="6,4" stroke-linejoin="round" marker-end="url(#arrow)"/>


  <g transform="translate(230, 310)">
    <circle cx="0" cy="-4" r="10" fill="#1E293B"/>
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">1</text>
    <text x="16" y="0" font-size="14" font-weight="500" fill="#0F172A">Website Request</text>
  </g>

  <g transform="translate(230, 370)">
    <circle cx="0" cy="-4" r="10" fill="#1E293B"/>
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">8</text>
    <text x="16" y="0" font-size="14" font-weight="500" fill="#0F172A">Final IP Delivered</text>
  </g>

  <g transform="translate(620, 250)">
    <circle cx="0" cy="-4" r="10" fill="#1E293B"/>
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">2</text>
    <text x="16" y="0" font-size="13" fill="#0F172A">Ask Root Server</text>
  </g>

  <g transform="translate(630, 300)">
    <circle cx="0" cy="-4" r="10" fill="#1E293B"/>
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">3</text>
    <text x="16" y="0" font-size="13" fill="#475569">Returns TLD Server IP</text>
  </g>

  <g transform="translate(620, 320)">
    <circle cx="0" cy="-4" r="10" fill="#1E293B"/>
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">4</text>
    <text x="16" y="0" font-size="13" fill="#0F172A">Ask TLD Server</text>
  </g>

  <g transform="translate(630, 390)">
    <circle cx="0" cy="-4" r="10" fill="#1E293B"/>
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">5</text>
    <text x="16" y="0" font-size="13" fill="#475569">Returns Authoritative IP</text>
  </g>

  <g transform="translate(620, 410)">
    <circle cx="0" cy="-4" r="10" fill="#1E293B"/>
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">6</text>
    <text x="16" y="0" font-size="13" fill="#0F172A">Ask Authoritative</text>
  </g>

  <g transform="translate(630, 460)">
    <circle cx="0" cy="-4" r="10" fill="#1E293B"/>
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">7</text>
    <text x="16" y="0" font-size="13" fill="#475569">Returns Website IP</text>
  </g>


  <rect x="50" y="260" width="160" height="180" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <g transform="translate(130, 310)">
    <rect x="-24" y="-20" width="48" height="32" rx="2" fill="none" stroke="#334155" stroke-width="2"/>
    <path d="M -8 12 L -12 24 L 12 24 L 8 12 Z" fill="#334155"/>
    <line x1="-24" y1="8" x2="24" y2="8" stroke="#334155" stroke-width="2"/>
  </g>
  <text x="130" y="370" font-size="16" font-weight="bold" fill="#0F172A" text-anchor="middle">User Device</text>
  <text x="130" y="388" font-size="13" fill="#475569" text-anchor="middle">(Browser &amp; OS)</text>
  <rect x="65" y="405" width="130" height="24" rx="4" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="130" y="421" font-size="12" fill="#475569" text-anchor="middle">Local DNS Cache</text>


  <rect x="420" y="240" width="180" height="220" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <g transform="translate(510, 310)">
    <rect x="-20" y="-30" width="40" height="60" rx="2" fill="none" stroke="#334155" stroke-width="2"/>
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#334155" stroke-width="2"/>
    <line x1="-20" y1="10" x2="20" y2="10" stroke="#334155" stroke-width="2"/>
    <circle cx="-10" cy="-20" r="2" fill="#334155"/>
    <circle cx="-10" cy="0" r="2" fill="#334155"/>
    <circle cx="-10" cy="20" r="2" fill="#334155"/>
  </g>
  <text x="510" y="380" font-size="16" font-weight="bold" fill="#0F172A" text-anchor="middle">Recursive DNS</text>
  <text x="510" y="400" font-size="13" fill="#475569" text-anchor="middle">(ISP Resolver)</text>
  <rect x="445" y="420" width="130" height="24" rx="4" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="510" y="436" font-size="12" fill="#475569" text-anchor="middle">Server Cache</text>


  <rect x="950" y="70" width="180" height="100" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <g transform="translate(1040, 95)">
    <rect x="-14" y="-12" width="28" height="24" rx="2" fill="none" stroke="#334155" stroke-width="2"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#334155" stroke-width="2"/>
  </g>
  <text x="1040" y="135" font-size="16" font-weight="bold" fill="#0F172A" text-anchor="middle">Root Server</text>
  <text x="1040" y="155" font-size="13" fill="#475569" text-anchor="middle">e.g., (.)</text>


  <rect x="950" y="300" width="180" height="100" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <g transform="translate(1040, 325)">
    <rect x="-14" y="-12" width="28" height="24" rx="2" fill="none" stroke="#334155" stroke-width="2"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#334155" stroke-width="2"/>
  </g>
  <text x="1040" y="365" font-size="16" font-weight="bold" fill="#0F172A" text-anchor="middle">TLD Server</text>
  <text x="1040" y="385" font-size="13" fill="#475569" text-anchor="middle">e.g., (.com, .net)</text>


  <rect x="950" y="530" width="180" height="100" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <g transform="translate(1040, 555)">
    <rect x="-14" y="-12" width="28" height="24" rx="2" fill="none" stroke="#334155" stroke-width="2"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#334155" stroke-width="2"/>
  </g>
  <text x="1040" y="595" font-size="16" font-weight="bold" fill="#0F172A" text-anchor="middle">Authoritative</text>
  <text x="1040" y="615" font-size="13" fill="#475569" text-anchor="middle">e.g., (example.com)</text>

</svg>
