<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" style="background-color: #FAFAFA; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Caveat', 'Kalam', cursive, sans-serif;">
  <defs>
    <!-- Excalidraw Sketchy Wobble Filter -->
    <filter id="wobble" filterUnits="userSpaceOnUse" x="-100" y="-100" width="1600" height="900" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <!-- Arrowhead Markers for different colors -->
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <!-- Sketchy Computer Icon -->
    <g id="pc">
      <rect x="-35" y="-25" width="70" height="45" rx="4" fill="#ffffff" stroke="#475569" stroke-width="2"/>
      <line x1="-35" y1="10" x2="35" y2="10" stroke="#475569" stroke-width="2"/>
      <rect x="-10" y="20" width="20" height="15" fill="#ffffff" stroke="#475569" stroke-width="2"/>
      <rect x="-25" y="35" width="50" height="8" rx="3" fill="#ffffff" stroke="#475569" stroke-width="2"/>
    </g>
  </defs>

  <!-- Main Title -->
  <text x="700" y="55" font-size="34" font-weight="bold" fill="#0f172a" text-anchor="middle" letter-spacing="1">TCP vs UDP Protocol Flow</text>

  <!-- ====================================================================== -->
  <!-- LEFT PANEL: TCP (Transmission Control Protocol) -->
  <!-- ====================================================================== -->
  <g filter="url(#wobble)">
    <!-- Panel Background (Double stroke for sketchy feel) -->
    <rect x="40" y="100" width="640" height="560" rx="12" fill="#ffffff"/>
    <rect x="40" y="100" width="640" height="560" rx="12" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <rect x="43" y="103" width="634" height="554" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  </g>

  <!-- TCP Headers/Text (Kept outside wobble filter for readability) -->
  <text x="360" y="145" font-size="24" font-weight="bold" fill="#ef4444" text-anchor="middle">TCP (Connection-Oriented)</text>
  <text x="360" y="170" font-size="16" fill="#64748b" text-anchor="middle">Guarantees delivery, ordering, and checks for errors.</text>

  <text x="160" y="215" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">Sender</text>
  <text x="560" y="215" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">Receiver</text>

  <g filter="url(#wobble)">
    <!-- PCs -->
    <use href="#pc" x="160" y="260"/>
    <use href="#pc" x="560" y="260"/>

    <!-- Lifelines (Time flowing downwards) -->
    <line x1="160" y1="310" x2="160" y2="520" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6"/>
    <line x1="560" y1="310" x2="560" y2="520" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6"/>

    <!-- 1. SYN -->
    <line x1="160" y1="330" x2="550" y2="350" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow-dark)"/>
    <!-- 2. SYN-ACK -->
    <line x1="560" y1="370" x2="170" y2="390" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <!-- 3. DATA -->
    <line x1="160" y1="420" x2="550" y2="440" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <!-- 4. ACK -->
    <line x1="560" y1="460" x2="170" y2="480" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  </g>

  <!-- TCP Arrow Labels -->
  <text x="360" y="335" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">1. SYN (Hello, can we talk?)</text>
  <text x="360" y="375" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">2. SYN-ACK (Yes, I hear you!)</text>
  <text x="360" y="425" font-size="15" font-weight="bold" fill="#3b82f6" text-anchor="middle">3. DATA (Here is the actual payload)</text>
  <text x="360" y="465" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">4. ACK (I received the data safely!)</text>

  <!-- TCP Summary -->
  <text x="360" y="580" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">Best for: Web Browsing, Email, File Transfers</text>
  <text x="360" y="605" font-size="14" fill="#475569" text-anchor="middle">Because dropping a chunk of a webpage or email breaks it.</text>


  <!-- ====================================================================== -->
  <!-- RIGHT PANEL: UDP (User Datagram Protocol) -->
  <!-- ====================================================================== -->
  <g filter="url(#wobble)">
    <!-- Panel Background -->
    <rect x="720" y="100" width="640" height="560" rx="12" fill="#ffffff"/>
    <rect x="720" y="100" width="640" height="560" rx="12" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <rect x="723" y="103" width="634" height="554" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  </g>

  <!-- UDP Headers/Text -->
  <text x="1040" y="145" font-size="24" font-weight="bold" fill="#3b82f6" text-anchor="middle">UDP (Connectionless)</text>
  <text x="1040" y="170" font-size="16" fill="#64748b" text-anchor="middle">High speed, low overhead, "best effort" delivery.</text>

  <text x="840" y="215" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">Sender</text>
  <text x="1240" y="215" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">Receiver</text>

  <g filter="url(#wobble)">
    <!-- PCs -->
    <use href="#pc" x="840" y="260"/>
    <use href="#pc" x="1240" y="260"/>

    <!-- Lifelines -->
    <line x1="840" y1="310" x2="840" y2="520" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6"/>
    <line x1="1240" y1="310" x2="1240" y2="520" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6"/>

    <!-- Rapid Fire Data Streams -->
    <!-- Data 1 -->
    <line x1="840" y1="330" x2="1230" y2="345" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <!-- Data 2 -->
    <line x1="840" y1="360" x2="1230" y2="375" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    
    <!-- Dropped Packet -->
    <line x1="840" y1="390" x2="1030" y2="397.5" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="4 2"/>
    <path d="M 1025,385 L 1045,410 M 1045,385 L 1025,410" stroke="#ef4444" stroke-width="3"/>
    
    <!-- Data Continues -->
    <line x1="840" y1="420" x2="1230" y2="435" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <line x1="840" y1="450" x2="1230" y2="465" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  </g>

  <!-- UDP Arrow Labels -->
  <text x="1040" y="325" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">DATA (No handshake required)</text>
  <text x="1040" y="365" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">DATA</text>
  <text x="1090" y="402" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="start">Packet Lost (Sender doesn't care)</text>
  <text x="1040" y="425" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">DATA (Stream just continues)</text>
  <text x="1040" y="475" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">DATA</text>

  <!-- UDP Summary -->
  <text x="1040" y="580" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">Best for: Live Video, VoIP Calls, Gaming</text>
  <text x="1040" y="605" font-size="14" fill="#475569" text-anchor="middle">Because a skipped video frame is better than the whole video pausing.</text>

</svg>
